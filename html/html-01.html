<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráfico SVG</title>
</head>
<body>
    <h1>Gráfico SVG</h1>
    <svg width="100" height="100">
        <circle r="40" cx="50" cy="50" fill="green" stroke="lime" stroke-width="4">
                <animate
                    attributeName="cx"
                    begin="0s"
                    dur="2s"
                    from="50"
                    to="90%"
                    repeatCount="indefinite" />
        </circle>
    </svg>
    <p></p>
    <svg width="200" height="100">
        <rect width="1000" height="100" fill="GREEN">
            <animate attributeName="x" from="0" to="100" dur="2s" repeatCount="indefinite" />
        </rect>
    </svg>
    <svg width="100" height="100">
        <circle r="60" cx="40" cy="50" fill="" stroke="" stroke-width="4">
        </circle>
    </svg>
    <p></p>
    <svg width="100" height="100">
        <circle r="40" cx="50" cy="50" fill="green" stroke="lime" stroke-width="4">
                <animate
                    attributeName="cx"
                    begin="0s"
                    dur="2s"
                    from="50"
                    to="90%"
                    repeatCount="indefinite" />
        </circle>
    </svg>
    <h2>Ejemplo com img</h2>
    <img src="circulo.svg" alt="">
    <h2>Menú hamburguesa</h2>
    <img src="icono.svg" alt="Menú">
</body>
</html>
